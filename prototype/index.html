<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TrailNote Mobile Web Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    <div class="prototype-shell">
      <aside class="desktop-panel">
        <div class="desktop-panel__eyebrow">TrailNote Prototype</div>
        <h1 class="desktop-panel__title">移动端 Web 原型</h1>
        <p class="desktop-panel__copy">
          这套原型基于已沉淀的设计系统 token 与移动端界面规范构建，后续需求变更可以直接沿着这一版继续迭代。
        </p>
        <section class="desktop-panel__section">
          <h2 class="desktop-panel__section-title">核心流程</h2>
          <div class="desktop-panel__nav" id="desktop-core-nav"></div>
        </section>
        <section class="desktop-panel__section">
          <h2 class="desktop-panel__section-title">补充页面</h2>
          <div class="desktop-panel__nav" id="desktop-support-nav"></div>
        </section>
        <div class="desktop-panel__footnote">
          `prototype/tokens.json` 和 `prototype/theme.css` 已经可直接给研发使用。当前原型为无后端的前端交互基座。
        </div>
      </aside>
      <main class="mobile-stage">
        <div class="device-frame">
          <div class="device-screen">
            <div id="app" class="app-root"></div>
          </div>
        </div>
      </main>
    </div>
    <script defer src="./src/app.js"></script>
  </body>
  </html>
